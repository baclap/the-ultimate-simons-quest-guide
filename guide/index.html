    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://theultimatesimonsquestguide.com/#website",
            "url": "https://theultimatesimonsquestguide.com/",
            "name": "The Ultimate Simon’s Quest Guide",
            "alternateName": "Castlevania II: Simon’s Quest Interactive Map",
            "inLanguage": "en-US"
          },
          {
            "@type": "WebPage",
            "@id": "https://theultimatesimonsquestguide.com/#webpage",
            "url": "https://theultimatesimonsquestguide.com/",
            "name": "The Ultimate Simon’s Quest Guide — An interactive Castlevania II map",
            "description": "Explore Castlevania II: Simon’s Quest through an interactive map, a guide to its secrets, hidden paths, and peculiar charm.",
            "isPartOf": {
              "@id": "https://theultimatesimonsquestguide.com/#website"
            },
            "about": {
              "@type": "VideoGame",
              "name": "Castlevania II: Simon’s Quest",
              "alternateName": "Castlevania 2",

          }
        ]
      }
    </script>
    <title>The Ultimate Simon’s Quest Guide — An interactive Castlevania II map</title>
  </head>
  <body>
    <main id="app" class="guide-shell">
      <canvas id="map-canvas" class="map-surface" tabindex="0" aria-label="Castlevania II: Simon’s Quest interactive map and guide"></canvas>
      <canvas id="scene-canvas" class="map-surface" tabindex="0" aria-label="Berkeley Mansion interior map" hidden></canvas>
      <div id="overlay-layer" class="overlay-layer" aria-hidden="false"></div>
      <div id="view-transition" class="view-transition" aria-hidden="true"></div>
      <div id="loading-overlay" class="loading-overlay is-active" role="status" aria-live="polite" aria-label="Loading Castlevania II guide">
        <div class="loading-panel">
          <div id="loading-meter" class="loading-meter" role="progressbar" aria-label="Loading Castlevania II guide" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="loading-meter-fill" class="loading-meter-fill" style="transform: scaleX(0); transform-origin: left center; transition: none;"></div>
          </div>
        </div>
      </div>

      <div class="map-chrome" role="toolbar" aria-label="Guide controls">
        <button id="audio-toggle" type="button" class="chrome-button" aria-pressed="false" aria-label="Unmute guide music" title="Unmute guide music">
          <canvas id="audio-toggle-icon" class="chrome-icon" width="16" height="16" aria-hidden="true"></canvas>
        </button>
        <button id="palette-toggle" type="button" class="chrome-button" aria-pressed="false" aria-label="Switch to night palette" title="Switch to night palette">
          <canvas id="palette-toggle-icon" class="chrome-icon" width="16" height="16" aria-hidden="true"></canvas>
        </button>
        <button id="reset-toggle" type="button" class="chrome-button" aria-label="Reset guide to Jova spawn" title="Reset guide to Jova spawn">
          <canvas id="reset-toggle-icon" class="chrome-icon" width="16" height="16" aria-hidden="true"></canvas>
        </button>
        <button id="options-toggle" type="button" class="chrome-button" aria-expanded="false" aria-controls="options-panel" aria-label="Show guide layers" title="Show guide layers">
          <canvas id="options-toggle-icon" class="chrome-icon" width="16" height="16" aria-hidden="true"></canvas>
        </button>
      </div>

      <aside id="options-panel" class="options-panel" aria-label="Guide display options" hidden>
        <div class="panel-heading">
          <strong>Guide Layers</strong>
          <span>Choose which guide overlays are visible.</span>
        </div>
        <fieldset>
          <legend>Visibility</legend>
          <label><input id="toggle-labels" type="checkbox" checked> Labels</label>
          <label><input id="toggle-show-characters" type="checkbox" checked> Characters</label>
          <label><input id="toggle-section-outlines" type="checkbox" checked> Map sections</label>
          <label><input id="toggle-show-secrets" type="checkbox" checked> Secrets</label>
        </fieldset>
        <fieldset>
          <legend>Highlights</legend>
          <label><input id="toggle-highlight-doors" type="checkbox" checked> Doors</label>
          <label><input id="toggle-highlight-characters" type="checkbox" checked> Characters</label>
          <label><input id="toggle-highlight-map-objects" type="checkbox" checked> Map objects</label>
          <label><input id="toggle-highlight-secrets" type="checkbox" checked> Secrets</label>
        </fieldset>
        <div class="panel-meta">
          <span id="guide-version"></span>
          <a id="repo-link" class="panel-info-link" href="https://github.com/baclap/the-ultimate-simons-quest-guide" target="_blank" rel="noopener noreferrer" aria-label="Open project README" title="Open project README">i</a>
        </div>
      </aside>

      <section id="guide-card" class="guide-card" aria-live="polite" hidden>
        <div id="dialog-box" class="dialog-box" role="status">
          <canvas id="dialog-frame-canvas" class="dialog-frame-canvas" aria-hidden="true"></canvas>
          <p id="dialog-text" class="dialog-text"></p>
          <button id="dialog-close" type="button" class="dialog-close" aria-label="Close dialog">
            <canvas id="dialog-close-frame-canvas" class="dialog-close-frame-canvas" aria-hidden="true"></canvas>
            <span aria-hidden="true">X</span>
          </button>
        </div>
      </section>

      <section id="guide-inspector" class="guide-inspector" aria-live="polite" hidden>
        <header>
          <strong id="guide-inspector-title"></strong>
          <button id="guide-inspector-close" type="button" class="icon-button" aria-label="Close details">x</button>
        </header>
        <p id="guide-inspector-summary"></p>
        <dl id="guide-inspector-list"></dl>
      </section>

      <div id="status" class="status"></div>

    </main>

    <script type="module" src="/src/app.js?dev-sw-bypass=1"></script>
  </body>
</html>
