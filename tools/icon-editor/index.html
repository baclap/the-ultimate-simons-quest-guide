<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>CV2 Guide Icon Editor</title>
    <style>
      @font-face {
        font-family: "CV2 Dialog";
        src: url("../../guide/assets/fonts/cv2-dialog.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        background:
          linear-gradient(rgba(0, 0, 0, 0.46), rgba(0, 0, 0, 0.46)),
          repeating-linear-gradient(0deg, #10100f 0 16px, #171715 16px 32px);
        color: rgb(255, 254, 255);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button {
        font: inherit;
      }

      button:focus-visible {
        outline: 3px solid rgba(255, 254, 255, 0.86);
        outline-offset: 3px;
      }

      .page {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }

      header {
        display: grid;
        gap: 6px;
        margin-bottom: 20px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1,
      h2,
      .option-id {
        font-family: "CV2 Dialog", ui-monospace, SFMono-Regular, Menlo, monospace;
        font-weight: 400;
        letter-spacing: 0;
      }

      h1 {
        font-size: clamp(20px, 3vw, 28px);
      }

      h2 {
        font-size: 16px;
      }

      p {
        max-width: 720px;
        color: #c7bfb1;
        line-height: 1.45;
      }

      .panel {
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(8, 8, 7, 0.88);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.46);
      }

      .preview-panel {
        position: sticky;
        top: 0;
        z-index: 2;
        display: grid;
        gap: 12px;
        margin-bottom: 18px;
        padding: 14px;
      }

      .preview-row,
      .frame-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .preview-item,
      .frame-item {
        display: grid;
        gap: 6px;
        justify-items: center;
      }

      .caption {
        color: #c7bfb1;
        font-size: 12px;
      }

      .frame-grid,
      .option-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
        gap: 12px;
      }

      .section {
        display: grid;
        gap: 12px;
        margin-top: 18px;
        padding: 14px;
      }

      .option-card {
        display: grid;
        gap: 8px;
        justify-items: center;
        min-height: 126px;
        padding: 12px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(0, 0, 0, 0.34);
        color: rgb(255, 254, 255);
        cursor: pointer;
      }

      .option-card:hover,
      .option-card[aria-pressed="true"] {
        border-color: rgba(255, 254, 255, 0.42);
        background: rgba(20, 47, 219, 0.16);
      }

      .option-id {
        color: #fff7dd;
        font-size: 13px;
      }

      .chrome-button {
        position: relative;
        display: grid;
        place-items: center;
        width: 44px;
        height: 44px;
        padding: 0;
        border: 0;
        appearance: none;
        background: #000;
        color: rgb(255, 254, 255);
        box-shadow:
          inset 0 0 0 4px #142fdb,
          inset 0 0 0 5px #000,
          0 3px 0 rgba(0, 0, 0, 0.86);
        image-rendering: pixelated;
      }

      .frame-square {
        border-radius: 0;
      }

      .frame-soft {
        border-radius: 3px;
        overflow: hidden;
      }

      .frame-soft::before {
        content: "";
        position: absolute;
        inset: 1px;
        border-radius: 2px;
        box-shadow: inset 0 0 0 1px rgba(255, 254, 255, 0.12);
        pointer-events: none;
      }

      .chrome-icon {
        display: block;
        width: 32px;
        height: 32px;
        image-rendering: pixelated;
        pointer-events: none;
        user-select: none;
      }

      .editor-panel {
        grid-template-columns: minmax(0, 1fr) minmax(280px, 0.84fr);
        align-items: start;
      }

      .editor-left,
      .editor-right,
      .copy-area {
        display: grid;
        gap: 10px;
      }

      .editor-top {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
      }

      .pixel-editor {
        display: grid;
        grid-template-columns: repeat(16, 22px);
        grid-template-rows: repeat(16, 22px);
        gap: 1px;
        width: max-content;
        padding: 8px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: #030303;
        touch-action: none;
      }

      .pixel-cell {
        width: 22px;
        height: 22px;
        padding: 0;
        border: 0;
        border-radius: 0;
        background:
          linear-gradient(45deg, rgba(255, 255, 255, 0.08) 25%, transparent 25% 75%, rgba(255, 255, 255, 0.08) 75%),
          linear-gradient(45deg, rgba(255, 255, 255, 0.08) 25%, transparent 25% 75%, rgba(255, 255, 255, 0.08) 75%);
        background-position: 0 0, 5px 5px;
        background-size: 10px 10px;
        cursor: crosshair;
      }

      .pixel-cell[data-value="W"] {
        background: rgb(255, 254, 255);
      }

      .pixel-cell[data-value="G"] {
        background: rgb(184, 184, 184);
      }

      .pixel-cell[data-value="Y"] {
        background: rgb(234, 158, 34);
      }

      .swatches {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .swatch {
        display: grid;
        place-items: center;
        min-width: 44px;
        height: 44px;
        padding: 0 8px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 0;
        background: #000;
        color: rgb(255, 254, 255);
        cursor: pointer;
      }

      .swatch::before {
        content: "";
        display: block;
        width: 22px;
        height: 22px;
        border: 1px solid rgba(255, 255, 255, 0.34);
        background:
          linear-gradient(45deg, rgba(255, 255, 255, 0.14) 25%, transparent 25% 75%, rgba(255, 255, 255, 0.14) 75%),
          linear-gradient(45deg, rgba(255, 255, 255, 0.14) 25%, transparent 25% 75%, rgba(255, 255, 255, 0.14) 75%);
        background-position: 0 0, 5px 5px;
        background-size: 10px 10px;
      }

      .swatch[data-value="W"]::before {
        background: rgb(255, 254, 255);
      }

      .swatch[data-value="G"]::before {
        background: rgb(184, 184, 184);
      }

      .swatch[data-value="Y"]::before {
        background: rgb(234, 158, 34);
      }

      .swatch[aria-pressed="true"] {
        border-color: rgb(255, 254, 255);
        box-shadow: inset 0 0 0 2px #142fdb;
      }

      .editor-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .lab-button,
      .candidate-select {
        min-height: 36px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 0;
        background: #24231f;
        color: #fff7dd;
      }

      .lab-button {
        padding: 0 12px;
        cursor: pointer;
      }

      .lab-button:hover {
        background: #313027;
      }

      .candidate-select {
        min-width: min(100%, 260px);
        padding: 0 8px;
      }

      .grid-output {
        width: 100%;
        min-height: 260px;
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 0;
        background: #030303;
        color: rgb(255, 254, 255);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        line-height: 1.35;
        letter-spacing: 0;
        resize: vertical;
        white-space: pre;
      }

      .copy-status {
        min-height: 18px;
        color: #c7bfb1;
        font-size: 12px;
      }

      @media (max-width: 640px) {
        .page {
          width: min(100vw - 20px, 1120px);
          padding-top: 12px;
        }

        .preview-panel {
          position: static;
        }

        .editor-panel {
          grid-template-columns: 1fr;
        }

        .pixel-editor {
          grid-template-columns: repeat(16, minmax(15px, 1fr));
          grid-template-rows: repeat(16, minmax(15px, 1fr));
          width: 100%;
        }

        .pixel-cell {
          width: auto;
          height: auto;
          aspect-ratio: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header>
        <h1>CV2 Guide Icon Editor</h1>
        <p>Draw in the 16x16 grid, then copy the text format. Use W for white, G for grey, Y for gold, and . for transparent.</p>
      </header>

      <section class="panel section editor-panel" aria-labelledby="editor-heading">
        <div class="editor-left">
          <div class="editor-top">
            <h2 id="editor-heading">Editor</h2>
            <div class="swatches" role="toolbar" aria-label="Paint color">
              <button class="swatch" type="button" data-value="." aria-pressed="false" aria-label="Transparent"></button>
              <button class="swatch" type="button" data-value="W" aria-pressed="true" aria-label="White"></button>
              <button class="swatch" type="button" data-value="G" aria-pressed="false" aria-label="Grey"></button>
              <button class="swatch" type="button" data-value="Y" aria-pressed="false" aria-label="Gold"></button>
            </div>
          </div>
          <div id="pixel-editor" class="pixel-editor" role="grid" aria-label="16 by 16 icon editor"></div>
          <div class="editor-actions">
            <select id="candidate-select" class="candidate-select" aria-label="Load candidate icon"></select>
            <button id="load-candidate" class="lab-button" type="button">Load</button>
            <button id="clear-editor" class="lab-button" type="button">Clear</button>
            <button id="fill-editor" class="lab-button" type="button">Fill</button>
          </div>
        </div>
        <div class="editor-right">
          <h2>Output</h2>
          <div class="preview-item">
            <button class="chrome-button frame-soft" type="button" aria-label="Edited icon preview">
              <canvas id="editor-preview-icon" class="chrome-icon" width="16" height="16" aria-hidden="true"></canvas>
            </button>
            <span class="caption">edited icon preview</span>
          </div>
          <div class="copy-area">
            <textarea id="grid-output" class="grid-output" spellcheck="false" aria-label="Icon text grid"></textarea>
            <div class="editor-actions">
              <button id="copy-output" class="lab-button" type="button">Copy grid</button>
              <button id="apply-output" class="lab-button" type="button">Apply text</button>
            </div>
            <div id="copy-status" class="copy-status" role="status" aria-live="polite"></div>
          </div>
        </div>
      </section>

      <section class="panel preview-panel" aria-label="Selected icon preview">
        <h2>Preview</h2>
        <div id="preview-row" class="preview-row"></div>
        <div class="frame-row" aria-label="Frame comparison">
          <div class="frame-item">
            <button class="chrome-button frame-square" type="button" aria-label="Square frame preview">
              <canvas class="chrome-icon" width="16" height="16" data-icon="layers-a" aria-hidden="true"></canvas>
            </button>
            <span class="caption">square</span>
          </div>
          <div class="frame-item">
            <button class="chrome-button frame-soft" type="button" aria-label="Soft frame preview">
              <canvas class="chrome-icon" width="16" height="16" data-icon="layers-a" aria-hidden="true"></canvas>
            </button>
            <span class="caption">soft</span>
          </div>
        </div>
      </section>

      <section class="panel section" aria-labelledby="moon-heading">
        <h2 id="moon-heading">Moon</h2>
        <div id="moon-options" class="option-grid"></div>
      </section>

      <section class="panel section" aria-labelledby="sun-heading">
        <h2 id="sun-heading">Sun</h2>
        <div id="sun-options" class="option-grid"></div>
      </section>

      <section class="panel section" aria-labelledby="layers-heading">
        <h2 id="layers-heading">Layers</h2>
        <div id="layers-options" class="option-grid"></div>
      </section>

      <section class="panel section" aria-labelledby="audio-heading">
        <h2 id="audio-heading">Audio</h2>
        <div id="audio-options" class="option-grid"></div>
      </section>
    </main>

    <script type="module" src="icon-editor.js?v=icon-editor5"></script>
  </body>
</html>
