<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CV2 Dialog Specimen</title>
  <link rel="stylesheet" href="./cv2-dialog.css">
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8f0dc;
      --muted: #a7a0a0;
      --ground: #09090c;
      --panel: #151316;
      --line: #3b3034;
      --blood: #b42d34;
      --moss: #6f8d68;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--ground);
      color: var(--ink);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    header,
    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
    }

    header {
      min-height: 42vh;
      display: grid;
      align-content: end;
      padding: 56px 0 34px;
      border-bottom: 1px solid var(--line);
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      color: var(--blood);
      font-size: clamp(14px, 2vw, 22px);
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .headline {
      margin-top: 18px;
      font-size: clamp(28px, 8vw, 92px);
      line-height: 1.08;
      color: var(--ink);
      overflow-wrap: anywhere;
    }

    main {
      display: grid;
      gap: 34px;
      padding: 34px 0 56px;
    }

    section {
      display: grid;
      gap: 16px;
    }

    h2 {
      color: var(--moss);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .sample {
      padding: 20px;
      background: var(--panel);
      border: 1px solid var(--line);
      font-size: clamp(22px, 6vw, 64px);
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .glyphs {
      font-size: clamp(18px, 4vw, 42px);
      line-height: 1.45;
      color: var(--ink);
      overflow-wrap: anywhere;
    }

    .source {
      width: min(100%, 764px);
      height: auto;
      image-rendering: pixelated;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    code {
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <header>
    <h1 class="cv2-dialog-font">CV2 Dialog</h1>
    <p class="headline cv2-dialog-font">WHAT A HORRIBLE NIGHT TO HAVE A CURSE!</p>
  </header>
  <main>
    <section>
      <h2>Glyphs</h2>
      <p class="glyphs cv2-dialog-font">ABCDEFGHIJKLMNOPQRSTUVWXYZ<br>abcdefghijklmnopqrstuvwxyz<br>0123456789<br>.,'!-?</p>
    </section>
    <section>
      <h2>Dialogue</h2>
      <p class="sample cv2-dialog-font">BUY A WHITE CRYSTAL? PRESS START. DRACULA'S RIDDLE WAITS IN TOWN.</p>
    </section>
    <section>
      <h2>Source Tiles</h2>
      <img class="source" src="./cv2-dialog-source.png" alt="">
      <code>Generated from CHR bank 0x00 in roms/cv2.nes.</code>
    </section>
  </main>
</body>
</html>
